    <style>
      /* Critical inline CSS — prevents flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #080808;
        color: #F5F0E8;
        font-family: 'Raleway', system-ui, sans-serif;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      /* Loading screen */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #080808;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #loading-screen.fade-out { opacity: 0; pointer-events: none; }
      .loading-logo {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: linear-gradient(135deg, #D4AF37, #B8960C);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: #080808;
        margin-bottom: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-text {
        font-size: 11px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #D4AF37;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(212,175,55,0); }
      }
    </style>
  </head>
  <body>

    <!-- Loading screen — hidden once React mounts -->
    <div id="loading-screen">
      <div class="loading-logo">WG</div>
      <div class="loading-text">Where His Glory Flows</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Remove loading screen once app is ready -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const screen = document.getElementById('loading-screen');
          if (screen) {
            screen.classList.add('fade-out');
            setTimeout(() => screen.remove(), 500);
          }
        }, 800);
      });
    </script>

  </body>
