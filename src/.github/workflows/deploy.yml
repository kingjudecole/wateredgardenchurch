## STEP 5 — WATCH IT BUILD

1. Click the **Actions** tab at the top of your repository page
2. You will see a yellow circle ⏳ next to a line that says **Deploy Watered Garden Church to GitHub Pages**
3. Wait for it to turn into a green tick ✅
4. If it turns red ❌ — copy the error message and send it to Claude. Claude will fix it.

✅ Your site is built.

---

## STEP 6 — TURN ON GITHUB PAGES

1. Click the **Settings** tab at the top of your repository
2. In the left sidebar, scroll down and click **Pages**
3. Under **Source**, click the dropdown that says **None** or **Deploy from a branch**
4. Select **Deploy from a branch**
5. Under **Branch**, click the dropdown and select **gh-pages**
6. Leave the folder set to **/ (root)**
7. Click **Save**

---

## STEP 7 — SEE YOUR LIVE WEBSITE

Wait about 2 minutes, then go to:
```
https://YOUR-USERNAME.github.io/wateredgardenchurch/
```

Replace `YOUR-USERNAME` with the username you chose in Step 1.

For example if your username is `kingjudecole` it would be:
